<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockSense AI</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* BODY */
        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
        }

        /* NAVBAR */
        .custom-navbar {
            background: linear-gradient(90deg, #4facfe, #00c6ff);
            padding: 10px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .nav-link {
            color: white !important;
            margin: 0 10px;
            font-weight: 500;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        /* PROFILE IMAGE */
        .profile-img {
            width: 35px;
  height: 35px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.5);
        }

        /* CONTENT BOX */
        .content-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            
        }

        /* DROPDOWN FIX */
        .dropdown-menu {
            border-radius: 10px;
        }
        
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar custom-navbar d-flex justify-content-between align-items-center">

    <!-- LEFT SIDE -->
    <div>
        <span class="navbar-brand">StockSense AI</span>

        <a href="/" class="nav-link d-inline">Home</a>
        <a href="/inventory/" class="nav-link d-inline">Inventory</a>
        <a href="/dashboard/" class="nav-link d-inline">Dashboard</a>
        <a href="/upload/" class="nav-link d-inline">Upload</a>
    </div>

    <!-- RIGHT SIDE (PROFILE) -->
    <div class="dropdown">

        <a class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
           href="#"
           data-bs-toggle="dropdown">

            {% if request.user.is_authenticated and request.user.profile.image %}
                <img src="{{ request.user.profile.image.url }}" class="profile-img me-2">
            {% else %}
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img me-2">
            {% endif %}

            <strong>{{ request.user.username }}</strong>
        </a>

        <ul class="dropdown-menu dropdown-menu-end">

            <li>
                <a class="dropdown-item" href="/profile/">
                    <i class="fa fa-user"></i> Profile
                </a>
            </li>

            <li>
        <form action="/logout/" method="POST">
        {% csrf_token %}

        <button type="submit"
                class="dropdown-item"
                style="border:none; background:none; width:100%; text-align:left;">

            <i class="fa fa-sign-out-alt"></i> Logout

        </button>

    </form>
</li>

        </ul>
    </div>

</nav>


<!-- MAIN CONTENT -->
<div class="container mt-4">
    <div class="content-box">
        {% block content %}{% endblock %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
